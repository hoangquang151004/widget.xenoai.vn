name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24.13.0"
  NPM_VERSION: "11.6.2"

jobs:
  # ── Backend: Lint ─────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check apps/api/ --select E9,F63,F7,F82

  # ── Frontend: Build ───────────────────────────────────────────────────────
  build-web:
    name: Build Next.js Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Pin npm version
        run: |
          npm install -g npm@${{ env.NPM_VERSION }}
          node -v
          npm -v

      - name: Install UI package
        run: npm install --no-audit --no-fund
        working-directory: packages/ui

      - name: Test UI package
        run: npm run test
        working-directory: packages/ui

      - name: Build UI package
        run: npm run build
        working-directory: packages/ui

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001

  # ── Widget SDK: Build ────────────────────────────────────────────────────
  build-widget-sdk:
    name: Build Widget SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/widget-sdk/package-lock.json

      - name: Pin npm version
        run: |
          npm install -g npm@${{ env.NPM_VERSION }}
          node -v
          npm -v

      - name: Install UI package
        run: npm install --no-audit --no-fund
        working-directory: packages/ui

      - name: Test UI package
        run: npm run test
        working-directory: packages/ui

      - name: Build UI package
        run: npm run build
        working-directory: packages/ui

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        working-directory: apps/widget-sdk

      - name: Build
        run: npm run build
        working-directory: apps/widget-sdk

      - name: Verify widget artifact
        run: test -f apps/widget-sdk/dist/chatbot-embed.js

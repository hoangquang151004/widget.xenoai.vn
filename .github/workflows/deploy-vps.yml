name: CD — Deploy To VPS (PM2)

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch hoặc tag cần deploy (vd: main hoặc v1.2.3)"
        required: true
        default: "main"
        type: string
      run_migrations:
        description: "Chạy alembic upgrade head trước khi restart API"
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

env:
  APP_PATH_DEFAULT: /var/www/widget.xenoai.vn

jobs:
  verify-ci:
    name: Verify CI Before Deploy
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}
    steps:
      - name: Resolve target ref and ensure CI is green
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const targetRef = '${{ github.event.inputs.git_ref }}';
            const workflowPath = '.github/workflows/ci.yml';
            let targetSha = '';

            try {
              const branch = await github.rest.repos.getBranch({
                owner,
                repo,
                branch: targetRef,
              });
              targetSha = branch.data.commit.sha;
            } catch (_) {
              // not a branch, continue resolving as tag
            }

            if (!targetSha) {
              const tagRef = await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${targetRef}`,
              });
              targetSha = tagRef.data.object.sha;
              if (tagRef.data.object.type === 'tag') {
                const annotatedTag = await github.rest.git.getTag({
                  owner,
                  repo,
                  tag_sha: targetSha,
                });
                targetSha = annotatedTag.data.object.sha;
              }
            }

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner,
              repo,
              per_page: 100,
            });
            const ciWorkflow = workflows.find((w) => w.path === workflowPath);
            if (!ciWorkflow) {
              core.setFailed(`Không tìm thấy workflow ${workflowPath} trong repo.`);
              return;
            }
            const ciWorkflowId = ciWorkflow.id;
            const wid = Number(ciWorkflowId);
            core.info(
              `Verify CI: ${owner}/${repo} targetRef=${targetRef} targetSha=${targetSha} ciWorkflowId=${wid}`,
            );

            const sameWorkflow = (run) =>
              run.head_sha === targetSha && Number(run.workflow_id) === wid;

            /** Quét từng trang — push main thường nằm vài trang đầu. */
            async function findRunForSha(branches) {
              let anyForSha = null;
              for (const br of branches) {
                const base = {
                  owner,
                  repo,
                  workflow_id: ciWorkflowId,
                  status: 'completed',
                  per_page: 100,
                };
                if (br) base.branch = br;
                for (let page = 1; page <= 20; page += 1) {
                  const { data } = await github.rest.actions.listWorkflowRuns({
                    ...base,
                    page,
                  });
                  const runs = data.workflow_runs || [];
                  if (!runs.length) break;
                  for (const run of runs) {
                    if (!sameWorkflow(run)) continue;
                    if (!anyForSha) anyForSha = run;
                    if (run.conclusion === 'success') return { ok: run, anyForSha };
                  }
                  if (runs.length < 100) break;
                }
              }
              return { ok: null, anyForSha };
            }

            async function findPendingForSha(branches) {
              for (const status of ['in_progress', 'queued']) {
                for (const br of branches) {
                  const base = {
                    owner,
                    repo,
                    workflow_id: ciWorkflowId,
                    status,
                    per_page: 50,
                  };
                  if (br) base.branch = br;
                  const { data } = await github.rest.actions.listWorkflowRuns({
                    ...base,
                    page: 1,
                  });
                  for (const run of data.workflow_runs || []) {
                    if (sameWorkflow(run)) return run;
                  }
                }
              }
              return null;
            }

            let branchesToScan = [];
            try {
              await github.rest.repos.getBranch({ owner, repo, branch: targetRef });
              branchesToScan = [targetRef, 'main', 'develop', null];
            } catch (_) {
              branchesToScan = ['main', 'develop', null];
            }
            const seen = new Set();
            branchesToScan = branchesToScan.filter((b) => {
              const k = b === null ? '__null__' : b;
              if (seen.has(k)) return false;
              seen.add(k);
              return true;
            });

            const { ok: ciRun, anyForSha } = await findRunForSha(branchesToScan);

            if (!ciRun) {
              if (anyForSha) {
                core.setFailed(
                  `CI chưa pass cho commit ${targetSha}. Conclusion=${anyForSha.conclusion}`,
                );
              } else {
                const pending = await findPendingForSha(branchesToScan);
                if (pending) {
                  core.setFailed(
                    `CI đang chạy cho commit ${targetSha} (run #${pending.run_number}, status=${pending.status}). Đợi workflow "CI — Lint, Test, Build" hoàn tất success rồi deploy lại.`,
                  );
                } else {
                  core.setFailed(
                    `Không tìm thấy CI run (workflow ${workflowPath}) đã completed cho commit ${targetSha}. Đẩy code lên nhánh tương ứng, đợi job "CI — Lint, Test, Build" chạy xong (success) rồi deploy lại.`,
                  );
                }
              }
              return;
            }
            core.setOutput('target_sha', targetSha);
            core.info(`CI passed for ${targetSha} (run #${ciRun.run_number})`);

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    environment: production
    needs: verify-ci

    steps:
      - name: Validate SSH credentials and required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -e

          missing=0

          if [ -z "$VPS_HOST" ]; then
            echo "Missing secret: VPS_HOST"
            missing=1
          fi

          if [ -z "$VPS_USER" ]; then
            echo "Missing secret: VPS_USER"
            missing=1
          fi

          if [ -z "$VPS_PORT" ]; then
            echo "Missing secret: VPS_PORT"
            missing=1
          fi

          RESOLVED_SSH_KEY="$VPS_SSH_KEY"
          if [ -z "$RESOLVED_SSH_KEY" ]; then
            RESOLVED_SSH_KEY="$SSH_PRIVATE_KEY"
          fi

          if [ -z "$RESOLVED_SSH_KEY" ] && [ -z "$VPS_PASSWORD" ]; then
            echo "Missing SSH credential: provide VPS_SSH_KEY or SSH_PRIVATE_KEY or VPS_PASSWORD"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH key file
        id: prepare_ssh_key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -e

          RESOLVED_SSH_KEY="$VPS_SSH_KEY"
          if [ -z "$RESOLVED_SSH_KEY" ]; then
            RESOLVED_SSH_KEY="$SSH_PRIVATE_KEY"
          fi

          if [ -z "$RESOLVED_SSH_KEY" ]; then
            echo "key_path=" >> "$GITHUB_OUTPUT"
            echo "No SSH key provided, deploy step can fallback to password if configured."
            exit 0
          fi

          # Normalize common secret formats:
          # 1) literal \n sequences
          # 2) base64 body without BEGIN/END lines
          NORMALIZED_KEY="${RESOLVED_SSH_KEY//\\n/$'\n'}"

          if ! printf "%s" "$NORMALIZED_KEY" | grep -Eq "BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY"; then
            DECODED_KEY=$(printf "%s" "$NORMALIZED_KEY" | tr -d '\r\n' | base64 -d 2>/dev/null || true)
            if printf "%s" "$DECODED_KEY" | grep -Eq "BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY"; then
              NORMALIZED_KEY="$DECODED_KEY"
            fi
          fi

          KEY_PATH="$RUNNER_TEMP/deploy_key"
          printf "%s\n" "$NORMALIZED_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          if ! ssh-keygen -y -f "$KEY_PATH" >/dev/null 2>&1; then
            echo "Resolved SSH key is invalid. Ensure secret contains full private key or valid base64 of it."
            exit 1
          fi

          echo "key_path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ${{ steps.prepare_ssh_key.outputs.key_path }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          envs: APP_PATH_DEFAULT,PROD_API_URL
          script: |
            set -Ee

            CURRENT_STEP="bootstrap"

            log_step() {
              CURRENT_STEP="$1"
              echo
              echo "=== $CURRENT_STEP ==="
            }

            report_failure() {
              local exit_code=$?
              echo
              echo "=== DEPLOY FAILED ==="
              echo "Failed step: $CURRENT_STEP"
              echo "Exit code: $exit_code"
              echo "Working directory: $(pwd)"

              if [ -f /tmp/web-install.log ]; then
                echo "=== web-install.log (last 200 lines) ==="
                tail -n 200 /tmp/web-install.log || true
              fi

              if [ -f /tmp/web-build.log ]; then
                echo "=== web-build.log (last 200 lines) ==="
                tail -n 200 /tmp/web-build.log || true
              fi

              if command -v pm2 >/dev/null 2>&1; then
                echo "=== PM2 status ==="
                pm2 status || true
              fi
            }

            print_latest_npm_debug_log() {
              local latest_log
              latest_log=$(ls -1t "$HOME/.npm/_logs/"*-debug-0.log 2>/dev/null | awk 'NR==1 { print; exit }')
              if [ -n "$latest_log" ] && [ -f "$latest_log" ]; then
                echo "=== Latest npm debug log: $latest_log ==="
                cat "$latest_log" || true
              else
                echo "No npm debug log found in $HOME/.npm/_logs"
              fi
            }

            trap 'report_failure' ERR

            TARGET_REF="${{ github.event.inputs.git_ref }}"
            RUN_MIGRATIONS="${{ github.event.inputs.run_migrations }}"

            APP_PATH="${{ secrets.VPS_APP_PATH }}"
            if [ -z "$APP_PATH" ]; then
              APP_PATH="$APP_PATH_DEFAULT"
            fi

            log_step "Resolve deploy target"
            echo "Deploy path: $APP_PATH"
            echo "Target ref: $TARGET_REF"
            cd "$APP_PATH"

            log_step "Fetch repository refs"
            git fetch --all --prune --tags
            # Ghi đè chỉnh sửa cục bộ trên VPS (vd. apps/web/package-lock.json): checkout -f + reset --hard
            log_step "Checkout target ref"
            if git show-ref --verify --quiet "refs/remotes/origin/$TARGET_REF"; then
              git checkout -f "$TARGET_REF" 2>/dev/null || git checkout -f -b "$TARGET_REF" "origin/$TARGET_REF"
              git reset --hard "origin/$TARGET_REF"
            elif git show-ref --verify --quiet "refs/tags/$TARGET_REF"; then
              git fetch origin "refs/tags/$TARGET_REF:refs/tags/$TARGET_REF" 2>/dev/null || true
              git checkout -f "tags/$TARGET_REF"
              git reset --hard HEAD
            else
              echo "Ref '$TARGET_REF' does not exist on origin or tags."
              exit 1
            fi
            echo "Checked out commit: $(git rev-parse --short HEAD)"

            # Preflight dependencies
            log_step "Preflight dependencies"
            if command -v redis-cli >/dev/null 2>&1; then
              redis-cli ping || echo "Redis is not reachable before deploy"
            fi

            # Deploy API
            log_step "Install API dependencies"
            cd "$APP_PATH/apps/api"
            source venv/bin/activate
            pip install -r requirements.txt

            if [ "$RUN_MIGRATIONS" = "true" ]; then
              log_step "Run database migrations"
              venv/bin/alembic upgrade head
              # Migration safety gate: chạy script Python rời (tránh heredoc bị drone-ssh chèn exit-code line gây SyntaxError)
              venv/bin/python scripts/check_migration_gate.py
            else
              echo "Skip migrations by input flag"
            fi

            log_step "Restart API process"
            pm2 restart widget-api --update-env || \
              pm2 start "$APP_PATH/apps/api/venv/bin/python" --name widget-api -- -m uvicorn main:app --host 127.0.0.1 --port 8000

            # Deploy Worker (fixed Celery app path)
            log_step "Restart worker process"
            pm2 restart widget-worker --update-env || \
              pm2 start "$APP_PATH/apps/api/venv/bin/python" --name widget-worker --cwd "$APP_PATH/apps/api" -- -m celery -A worker.celery_app:celery_app worker --loglevel=info --pool=solo

            # Build shared UI package (apps/web và apps/widget-sdk depend on packages/ui dist/)
            log_step "Install shared UI dependencies"
            cd "$APP_PATH/packages/ui"
            npm install --no-audit --no-fund
            log_step "Build shared UI package"
            npm run build || { echo "=== UI BUILD FAILED ==="; exit 1; }

            # Deploy Web
            # npm ci fails khi package-lock thiếu optional binding cross-platform
            # (vd. unrs-resolver: lock tạo trên Windows chỉ pin win32-x64-msvc).
            # Dùng npm install --no-audit --no-fund để npm tự bổ sung binding đúng OS đích.
            log_step "Install web dependencies"
            cd "$APP_PATH/apps/web"
            echo "Current directory: $(pwd)"
            echo "Node version: $(node -v)"
            echo "npm version: $(npm -v)"
            echo "apps/web files:"
            ls
            INSTALL_STATUS=0
            npm install --no-audit --no-fund --verbose > /tmp/web-install.log 2>&1 || INSTALL_STATUS=$?
            cat /tmp/web-install.log
            echo "Web install exit code: $INSTALL_STATUS"
            if [ "$INSTALL_STATUS" -eq 0 ]; then
              echo "Web dependency install completed."
            else
              echo "=== WEB INSTALL FAILED ==="
              echo "Failed step: $CURRENT_STEP"
              echo "Exit code: $INSTALL_STATUS"
              print_latest_npm_debug_log
              exit 1
            fi
            # Giống Docker deploy: bake URL API công khai vào bundle (Next.js đọc lúc build).
            # Nếu thiếu, client mặc định http://localhost:8001 → trang HTTPS không gọi được API / mixed content.
            log_step "Prepare web build environment"
            if [ -z "${PROD_API_URL:-}" ]; then
              echo "Warning: secret PROD_API_URL is empty; continuing without NEXT_PUBLIC_API_URL."
            else
              NORMALIZED_PROD_API_URL=$(echo "${PROD_API_URL}" | sed 's#/$##')
              export NEXT_PUBLIC_API_URL="$NORMALIZED_PROD_API_URL"
              echo "Building web with NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
            fi
            echo "Prepare web build environment done."
            log_step "Build web dashboard"
            npm run build 2>&1 | tee /tmp/web-build.log
            BUILD_STATUS=${PIPESTATUS[0]}
            if [ "$BUILD_STATUS" -ne 0 ]; then
              echo "=== WEB BUILD FAILED ==="
              echo "Failed step: $CURRENT_STEP"
              echo "Exit code: $BUILD_STATUS"
              echo "=== Build log ==="
              cat /tmp/web-build.log
              echo "=== TypeScript errors (if any) ==="
              npx tsc --noEmit 2>&1 || true
              exit 1
            fi
            log_step "Restart web process"
            pm2 restart widget-web --update-env || \
              pm2 start npm --name widget-web -- start

            # Deploy Widget SDK
            log_step "Install widget SDK dependencies"
            cd "$APP_PATH/apps/widget-sdk"
            npm install --no-audit --no-fund
            log_step "Build widget SDK"
            npm run build || { echo "=== WIDGET SDK BUILD FAILED ==="; exit 1; }
            log_step "Restart widget SDK process"
            pm2 restart widget-sdk --update-env || \
              pm2 serve dist 3010 --name widget-sdk

            log_step "Persist PM2 process list"
            pm2 save

            # Health checks
            log_step "Run internal health checks"
            curl -fsS http://127.0.0.1:8000/api/health
            curl -fsS http://127.0.0.1:8000/api/health/detailed
            curl -fsSI http://127.0.0.1:3010/widget.js

            # Optional public HTTPS smoke (nếu cấu hình secret PROD_API_URL)
            if [ -n "$PROD_API_URL" ]; then
              log_step "Run public API health check"
              curl -fsS "${PROD_API_URL}/api/health"
            fi
${PROD_API_URL}/api/health"
            fi

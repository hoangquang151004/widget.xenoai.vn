name: Deploy — Build & Push Docker Images

on:
  push:
    tags:
      - "v*" # Trigger khi push tag v1.0.0, v1.2.3, etc.
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag release để gắn cho image (vd: v1.2.3)"
        required: true
        type: string

concurrency:
  group: deploy-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/xenoai

jobs:
  verify-ci:
    name: Verify CI Status
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      target_sha: ${{ steps.resolve_sha.outputs.target_sha }}

    steps:
      - name: Resolve version tag
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.release_tag }}"
          fi

          if [ -z "$VERSION" ]; then
            echo "Release tag is required"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure CI passed on this commit
        id: resolve_sha
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const version = '${{ steps.version.outputs.version }}';
            const workflowPath = '.github/workflows/ci.yml';

            const ref = await github.rest.git.getRef({
              owner,
              repo,
              ref: `tags/${version}`,
            });

            let targetSha = ref.data.object.sha;
            if (ref.data.object.type === 'tag') {
              const annotatedTag = await github.rest.git.getTag({
                owner,
                repo,
                tag_sha: targetSha,
              });
              targetSha = annotatedTag.data.object.sha;
            }

            const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
              owner,
              repo,
              per_page: 100,
            });
            const ciWorkflow = workflows.find((w) => w.path === workflowPath);
            if (!ciWorkflow) {
              core.setFailed(`Không tìm thấy workflow ${workflowPath} trong repo.`);
              return;
            }
            const ciWorkflowId = ciWorkflow.id;
            const wid = Number(ciWorkflowId);
            core.info(
              `Verify CI: ${owner}/${repo} tag=${version} targetSha=${targetSha} ciWorkflowId=${wid}`,
            );

            const sameWorkflow = (run) =>
              run.head_sha === targetSha && Number(run.workflow_id) === wid;

            async function findRunForSha(branches) {
              let anyForSha = null;
              for (const br of branches) {
                const base = {
                  owner,
                  repo,
                  workflow_id: ciWorkflowId,
                  status: 'completed',
                  per_page: 100,
                };
                if (br) base.branch = br;
                for (let page = 1; page <= 20; page += 1) {
                  const { data } = await github.rest.actions.listWorkflowRuns({
                    ...base,
                    page,
                  });
                  const runs = data.workflow_runs || [];
                  if (!runs.length) break;
                  for (const run of runs) {
                    if (!sameWorkflow(run)) continue;
                    if (!anyForSha) anyForSha = run;
                    if (run.conclusion === 'success') return { ok: run, anyForSha };
                  }
                  if (runs.length < 100) break;
                }
              }
              return { ok: null, anyForSha };
            }

            async function findPendingForSha(branches) {
              for (const status of ['in_progress', 'queued']) {
                for (const br of branches) {
                  const base = {
                    owner,
                    repo,
                    workflow_id: ciWorkflowId,
                    status,
                    per_page: 50,
                  };
                  if (br) base.branch = br;
                  const { data } = await github.rest.actions.listWorkflowRuns({
                    ...base,
                    page: 1,
                  });
                  for (const run of data.workflow_runs || []) {
                    if (sameWorkflow(run)) return run;
                  }
                }
              }
              return null;
            }

            const branchesToScan = ['main', 'develop', null];
            const { ok: ciRun, anyForSha } = await findRunForSha(branchesToScan);

            if (!ciRun) {
              if (anyForSha) {
                core.setFailed(
                  `CI chưa pass cho commit ${targetSha} (tag ${version}). Kết quả: ${anyForSha.conclusion}`,
                );
              } else {
                const pending = await findPendingForSha(branchesToScan);
                if (pending) {
                  core.setFailed(
                    `CI đang chạy cho commit ${targetSha} (run #${pending.run_number}, status=${pending.status}). Đợi success rồi chạy lại deploy (tag ${version}).`,
                  );
                } else {
                  core.setFailed(
                    `Không tìm thấy CI run (workflow ${workflowPath}) cho commit ${targetSha} (tag ${version}).`,
                  );
                }
              }
              return;
            }

            core.setOutput('target_sha', targetSha);
            core.info(`CI run #${ciRun.run_number} đã pass cho commit ${targetSha} (tag ${version})`);

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: verify-ci
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.verify-ci.outputs.version }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API Image ──────────────────────────────────────────────────────────
      - name: Build and push API image
        id: build_api
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ needs.verify-ci.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Web Image ─────────────────────────────────────────────────────────
      - name: Build and push Web image
        id: build_web
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ needs.verify-ci.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## 🚀 Deploy ${{ needs.verify-ci.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ needs.verify-ci.outputs.target_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ needs.verify-ci.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web:${{ needs.verify-ci.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- API Digest: ${{ steps.build_api.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web Digest: ${{ steps.build_web.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend: Lint ─────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check apps/api/ --select E9,F63,F7,F82

  # ── Backend: Tests ────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_chatbot
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.11.5
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
        working-directory: .

      - name: Wait for test services
        run: |
          python - <<'PY'
          import socket
          import time
          import urllib.request

          def wait_tcp(host: str, port: int, name: str, timeout: int = 90):
              start = time.time()
              while time.time() - start < timeout:
                  try:
                      with socket.create_connection((host, port), timeout=2):
                          print(f"{name} is ready on {host}:{port}")
                          return
                  except OSError:
                      time.sleep(2)
              raise SystemExit(f"Timeout waiting for {name} on {host}:{port}")

          def wait_http(url: str, name: str, timeout: int = 90):
              start = time.time()
              while time.time() - start < timeout:
                  try:
                      with urllib.request.urlopen(url, timeout=3) as resp:
                          if 200 <= resp.status < 500:
                              print(f"{name} is ready at {url} (status={resp.status})")
                              return
                  except Exception:
                      time.sleep(2)
              raise SystemExit(f"Timeout waiting for {name} at {url}")

          wait_tcp("localhost", 5432, "Postgres")
          wait_tcp("localhost", 6379, "Redis")
          wait_http("http://localhost:6333/readyz", "Qdrant")
          PY

      - name: Alembic upgrade (schema for integration tests)
        working-directory: apps/api
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_chatbot
          APP_ENCRYPTION_KEY: ci-local-only-encryption-key-not-for-production-use
        run: |
          python -m alembic upgrade head

      - name: Run pytest
        working-directory: apps/api
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_chatbot
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          APP_ENCRYPTION_KEY: ci-local-only-encryption-key-not-for-production-use
          GEMINI_API_KEY: ci-fake-key-for-tests
          ENV: test
        run: |
          python -m pytest tests/test_task03_analytics_reporting.py -v --tb=short --no-header
          python -m pytest tests/test_task04_platform_admin_hardening.py -v --tb=short --no-header
          python -m pytest tests/test_task05_sql_prodlike_validation.py -v --tb=short --no-header
          python -m pytest tests/test_task06_rag_history_policy.py -v --tb=short --no-header
          python -m pytest tests/test_payos_webhook.py -v --tb=short --no-header
          python -m pytest tests/ -v --tb=short --no-header

  # ── Frontend: Build ───────────────────────────────────────────────────────
  build-web:
    name: Build Next.js Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install UI package
        run: npm ci
        working-directory: packages/ui

      - name: Build UI package
        run: npm run build
        working-directory: packages/ui

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001

  # ── Widget SDK: Build ────────────────────────────────────────────────────
  build-widget-sdk:
    name: Build Widget SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/widget-sdk/package-lock.json

      - name: Install UI package
        run: npm ci
        working-directory: packages/ui

      - name: Build UI package
        run: npm run build
        working-directory: packages/ui

      - name: Install dependencies
        run: npm ci
        working-directory: apps/widget-sdk

      - name: Build
        run: npm run build
        working-directory: apps/widget-sdk

      - name: Verify widget artifact
        run: test -f apps/widget-sdk/dist/widget.js

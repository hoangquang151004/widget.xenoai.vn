services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  db:
    image: postgres:15-alpine
    container_name: xenoai-postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-widget_chatbot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xenoai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-widget_chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: xenoai-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - xenoai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  qdrant:
    image: qdrant/qdrant:v1.8.3
    container_name: xenoai-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - xenoai-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Application ──────────────────────────────────────────────────────────

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: xenoai-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - storage_data:/app/storage
    env_file:
      - .env.docker
    networks:
      - xenoai-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: xenoai-worker
    restart: always
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
    env_file:
      - .env.docker
    networks:
      - xenoai-network
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: xenoai-web
    restart: always
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8001
    networks:
      - xenoai-network
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.25-alpine
    container_name: xenoai-nginx
    restart: always
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "80:80"
      # Production HTTPS: mở 443 và gắn volume chứng chỉ — xem docs/PRODUCTION_RUNBOOK.md
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
    networks:
      - xenoai-network
    deploy:
      resources:
        limits:
          memory: 64M

# ─── Volumes & Networks ────────────────────────────────────────────────────

networks:
  xenoai-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  storage_data:   # Shared between api and worker
